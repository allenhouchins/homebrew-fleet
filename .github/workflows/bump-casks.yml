name: Bump casks

# Polls for new upstream releases and opens a PR bumping version + sha256
# when livecheck detects a newer version than what's in the cask.
#
# Requires the GH_TOKEN_BUMP secret (a fine-grained PAT scoped to this repo
# with Contents: write and Pull requests: write). The workflow skips itself
# if the secret isn't set, so it's safe to merge before the secret exists.

on:
  schedule:
    # Every 6 hours, offset from :00 to avoid the top-of-hour cron rush
    - cron: "17 */6 * * *"
  workflow_dispatch:
    inputs:
      cask:
        description: "Specific cask to bump (leave blank for all)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  check-secret:
    name: Check for PAT
    runs-on: ubuntu-latest
    outputs:
      has_token: ${{ steps.check.outputs.has_token }}
    steps:
      - id: check
        env:
          BUMP_TOKEN: ${{ secrets.GH_TOKEN_BUMP }}
        run: |
          if [ -n "$BUMP_TOKEN" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "::warning::GH_TOKEN_BUMP secret is not set. Skipping bump. See README for setup."
          fi

  bump:
    needs: check-secret
    if: needs.check-secret.outputs.has_token == 'true'
    name: Bump ${{ matrix.cask }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        # Add new casks here as the tap grows
        cask: [fleet-desktop]
    steps:
      - name: Check out tap
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN_BUMP }}

      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Skip if cask input doesn't match
        id: should-run
        env:
          CASK_INPUT: ${{ github.event.inputs.cask }}
          MATRIX_CASK: ${{ matrix.cask }}
        run: |
          if [ -n "$CASK_INPUT" ] && [ "$CASK_INPUT" != "$MATRIX_CASK" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping $MATRIX_CASK (input targets '$CASK_INPUT')"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git identity
        if: steps.should-run.outputs.run == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Detect new version via livecheck
        id: livecheck
        if: steps.should-run.outputs.run == 'true'
        run: |
          set -o pipefail
          # livecheck --json reports current vs latest. Use it to decide
          # whether bumping is needed and what version to bump to.
          json=$(brew livecheck --cask --json "allenhouchins/fleet/${{ matrix.cask }}")
          echo "$json"
          current=$(echo "$json" | jq -r '.[0].version.current // empty')
          latest=$(echo "$json" | jq -r '.[0].version.latest // empty')
          outdated=$(echo "$json" | jq -r '.[0].version.outdated // false')
          status=$(echo "$json" | jq -r '.[0].status // empty')

          if [ "$status" = "error" ]; then
            messages=$(echo "$json" | jq -r '.[0].messages // [] | join("; ")')
            echo "::error::livecheck failed for ${{ matrix.cask }}: $messages"
            exit 1
          fi

          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          echo "outdated=$outdated" >> "$GITHUB_OUTPUT"
          echo "::notice::${{ matrix.cask }}: current=$current latest=$latest outdated=$outdated"

      - name: Run brew bump-cask-pr
        if: steps.should-run.outputs.run == 'true' && steps.livecheck.outputs.outdated == 'true'
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GH_TOKEN_BUMP }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN_BUMP }}
          GH_TOKEN: ${{ secrets.GH_TOKEN_BUMP }}
        run: |
          # --no-fork pushes the bump branch directly to this tap (we own it).
          # --no-browse keeps it non-interactive.
          # sha256 is auto-computed from the new download.
          brew bump-cask-pr \
            --no-browse \
            --no-fork \
            --version "${{ steps.livecheck.outputs.latest }}" \
            --message "Automated bump via scheduled workflow." \
            "allenhouchins/fleet/${{ matrix.cask }}"

      - name: Skip (already at latest)
        if: steps.should-run.outputs.run == 'true' && steps.livecheck.outputs.outdated != 'true'
        run: |
          echo "::notice::${{ matrix.cask }} already at ${{ steps.livecheck.outputs.current }}, nothing to bump."
